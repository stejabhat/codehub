{% extends "base.html" %}
{% block content %}

<div class="card-hover p-6 rounded vintage-border bg-cosmic-800 max-w-md mx-auto">
  <h2 class="text-2xl font-semibold text-vintage-200 mb-6">Create Collection</h2>
  
  <form method="POST" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="block text-sm text-vintage-300 mb-2">Name</label>
      <input type="text" name="name" required 
             class="w-full px-4 py-2.5 rounded vintage-border bg-cosmic-900 text-vintage-100 focus:outline-none focus:ring-2 focus:ring-accent-400">
    </div>
    <div>
      <label class="block text-sm text-vintage-300 mb-2">Description</label>
      <textarea name="description" rows="3" 
                class="w-full px-4 py-2.5 rounded vintage-border bg-cosmic-900 text-vintage-100 focus:outline-none focus:ring-2 focus:ring-accent-400"></textarea>
    </div>
    <div>
      <label class="flex items-center text-vintage-300">
        <input type="checkbox" name="is_public" checked class="mr-2 accent-accent-400">
        Make this collection public
      </label>
    </div>
    <button type="submit" class="px-4 py-2.5 rounded btn-vintage text-vintage-100">Create</button>
  </form>
</div>

{% endblock %}
