{% extends "base.html" %}
{% block content %}
<div class="bg-gray-800 p-6 rounded shadow-lg">
  <h2 class="text-xl font-bold mb-4 text-red-400">⚠️ Confirm Delete</h2>
  <p>Are you sure you want to delete <strong>{{ snippet.title }}</strong>?</p>
  <form method="post" class="mt-4">
    {% csrf_token %}
    <button type="submit"
            class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded mr-2">Yes, Delete</button>
    <a href="{% url 'snippet_detail' snippet.pk %}"
       class="text-blue-300 hover:underline">Cancel</a>
  </form>
</div>
{% endblock %}
