{% extends "base.html" %}
{% block content %}

<div class="card-hover p-6 rounded vintage-border bg-cosmic-800">
  <h2 class="text-2xl font-semibold text-vintage-200 mb-6">Notifications</h2>
  
  {% if notifications %}
    <ul class="space-y-3">
      {% for notification in notifications %}
        <a href="{% url 'mark_notification_read' notification.pk %}" 
           class="card-hover block p-4 rounded vintage-border bg-cosmic-900 {% if not notification.is_read %}border-accent-400{% endif %}">
          <p class="text-vintage-300">{{ notification.message }}</p>
          <p class="text-teal-400/60 text-sm mt-1">{{ notification.created_at|timesince }} ago</p>
        </a>
      {% endfor %}
    </ul>
  {% else %}
    <p class="text-teal-400/60">No notifications.</p>
  {% endif %}
</div>

{% endblock %}
