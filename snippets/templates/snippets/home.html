{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-semibold mb-4">All Snippets</h2>

<form method="get" class="mb-6 flex items-center gap-2">
    <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}"
           class="w-full px-4 py-2 rounded-md bg-gray-800 text-white border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <button type="submit"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded text-white">Search</button>
</form>

<ul class="space-y-4">
    {% for snippet in snippets %}
    <li class="p-4 rounded shadow-md transition hover:shadow-lg
               {% cycle 'bg-gray-800' 'bg-gray-700' 'bg-blue-900' %}">
        <a href="{% url 'snippet_detail' snippet.pk %}" class="text-xl font-semibold text-blue-300 hover:underline">
            {{ snippet.title }}
        </a>
        <p class="text-sm text-gray-400 mt-1">Language: {{ snippet.language }}</p>
        <div class="mt-2">
            {% for tag in snippet.tag_list %}
                <a href="?q={{ tag }}" class="inline-block text-xs bg-blue-700 text-white px-2 py-1 rounded-full mr-2 hover:bg-blue-600">
                    #{{ tag }}
                </a>
            {% endfor %}
        </div>
    </li>
    {% empty %}
    <li class="text-gray-400">No snippets found.</li>
    {% endfor %}
</ul>
{% endblock %}
